[project]
name = "voco-livekit-agent"
version = "1.0.0"
description = "Voco AI voice receptionist — Twilio SIP + LiveKit + Gemini 3.1 Flash Live"
requires-python = ">=3.11"
dependencies = [
    # Pinned at 1.5.6 (2026-04-22) — mainline with capability-based Gemini 3.1 routing via PR #5413.
    # See .planning/phases/63-livekit-sdk-upgrade-to-1-5-6-mainline/63-RESEARCH.md for the full upgrade surface audit.
    "livekit-agents==1.5.6",
    "livekit-plugins-google==1.5.6",
    "livekit-plugins-silero==1.5.6",
    "livekit-plugins-turn-detector==1.5.6",
    "livekit-plugins-noise-cancellation>=0.2,<1",
    "livekit-api>=1.0,<2",
    "supabase>=2.0,<3",
    "openai>=2.0,<3",
    "twilio>=9.0,<10",
    "resend>=2.0,<3",
    "stripe>=10.0,<12",
    "google-auth>=2.0,<3",
    "google-api-python-client>=2.0,<3",
    "sentry-sdk>=2.0,<3",
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.30,<1",
    "python-multipart>=0.0.9,<1",
    "phonenumbers>=9.0,<10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
